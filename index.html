<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<link rel="stylesheet" href="./styles.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" defer></script>
<script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js" defer></script>
<script src="./app.js" defer></script>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>GIS Viewer</h1>
      <div class="subtitle">Anthony Burgard</div>
    </div>

    <div id="tab-bar">
      <button class="tab-btn active" data-tab="viewer">Viewer</button>
      <button class="tab-btn" data-tab="layers">Layers</button>
    </div>

    <!-- Viewer tab -->
    <div class="tab-pane active" id="tab-viewer">
      <div id="country-section">
        <div class="section-label" style="padding-top:10px">Zoom to country</div>
        <div style="padding:0 16px 10px">
          <select id="country-select">
            <option value="">— select country —</option>
          </select>
        </div>
      </div>

      <div id="dashboard-section" style="flex:1;overflow-y:auto">
        <div class="section-label">Features in view</div>
        <div id="dashboard-body">
          <div class="dash-empty">Load a layer to see stats</div>
        </div>
      </div>
    </div>

    <!-- Layers tab -->
    <div class="tab-pane" id="tab-layers">
      <div id="add-section">
        <button id="add-layer-btn" class="btn btn-ghost add-layer-btn">
          <span class="add-layer-icon">⊕</span> Add layer
        </button>
        <div id="add-layer-body">
          <div class="drop-zone" id="drop-zone">
            <div class="dz-icon">⊕</div>
            <p><strong>Drop a file</strong><br>.pmtiles · .geojson · .json</p>
          </div>
          <input type="file" id="file-input" accept=".pmtiles,.geojson,.json">
          <div id="url-row">
            <input id="url-input" type="text" placeholder="https://…file.pmtiles or .geojson" />
            <button class="btn btn-primary" id="url-load-btn">Load</button>
          </div>
        </div>
      </div>

      <div id="layers-section">
        <div id="empty-state">No layers loaded.<br>Drop a file or enter a URL above.</div>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <button id="sidebar-toggle" title="Toggle sidebar">›</button>
    <div id="map"></div>
    <div id="coords-bar">
      <span id="coords-lng">Lng: –</span>
      <span id="coords-lat">Lat: –</span>
      <span id="coords-zoom">Zoom: –</span>
    </div>
    <div id="feature-panel">
      <div id="feature-header">
        <span id="feature-layer-name"></span>
        <button id="feature-close">×</button>
      </div>
      <div id="feature-props"></div>
    </div>
    <div id="loading-toast">Loading…</div>
    <div id="error-toast"></div>
  </div>
</div>

</body>
</html>
